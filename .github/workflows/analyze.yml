name: Run Analysis and Deploy

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to commit notebook + sidecar updates back to main

concurrency:
  group: analyze-and-deploy-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'analytics/requirements.txt'

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Install dependencies
        run: pip install -q -r analytics/requirements.txt

      - name: Execute notebook in place (saves outputs + writes sidecar)
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          jupyter nbconvert --execute --inplace notebooks/ab_test_analysis.ipynb

      - name: Commit and push notebook changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notebooks/ab_test_analysis.ipynb notebooks/ab_test_analysis.summary.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[bot] update notebook analysis $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Validate analytics config
        run: |
          if [ "$PUBLIC_ENABLE_ANALYTICS" = "true" ]; then
            if [ -z "$PUBLIC_POSTHOG_KEY" ]; then
              echo "::error::PUBLIC_ENABLE_ANALYTICS is true but PUBLIC_POSTHOG_KEY secret is missing."
              exit 1
            fi
            if [ -z "$PUBLIC_POSTHOG_HOST" ]; then
              echo "::error::PUBLIC_ENABLE_ANALYTICS is true but PUBLIC_POSTHOG_HOST secret is missing."
              exit 1
            fi
            if [ -z "$PUBLIC_ANALYTICS_ALLOWED_HOSTS" ]; then
              echo "::error::PUBLIC_ENABLE_ANALYTICS is true but PUBLIC_ANALYTICS_ALLOWED_HOSTS variable is missing."
              exit 1
            fi
          else
            echo "Analytics disabled — skipping validation."
          fi
        env:
          PUBLIC_ENABLE_ANALYTICS: ${{ vars.PUBLIC_ENABLE_ANALYTICS }}
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
          PUBLIC_ANALYTICS_ALLOWED_HOSTS: ${{ vars.PUBLIC_ANALYTICS_ALLOWED_HOSTS }}

      - name: Deploy to Fly.io
        run: >
          flyctl deploy --remote-only
          --build-arg PUBLIC_POSTHOG_KEY="$PUBLIC_POSTHOG_KEY"
          --build-arg PUBLIC_POSTHOG_HOST="$PUBLIC_POSTHOG_HOST"
          --build-arg PUBLIC_POSTHOG_UI_HOST="$PUBLIC_POSTHOG_UI_HOST"
          --build-arg PUBLIC_ANALYTICS_ALLOWED_HOSTS="$PUBLIC_ANALYTICS_ALLOWED_HOSTS"
          --build-arg PUBLIC_SUPABASE_URL="$PUBLIC_SUPABASE_URL"
          --build-arg PUBLIC_SUPABASE_ANON_KEY="$PUBLIC_SUPABASE_ANON_KEY"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
          PUBLIC_POSTHOG_UI_HOST: ${{ vars.PUBLIC_POSTHOG_UI_HOST || 'https://us.posthog.com' }}
          PUBLIC_ANALYTICS_ALLOWED_HOSTS: ${{ vars.PUBLIC_ANALYTICS_ALLOWED_HOSTS }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}