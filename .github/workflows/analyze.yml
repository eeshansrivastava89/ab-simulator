name: Run Analysis and Deploy

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to commit notebook + sidecar updates back to main

concurrency:
  group: analyze-and-deploy-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'analytics/requirements.txt'

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Install dependencies
        run: pip install -q -r analytics/requirements.txt

      - name: Execute notebook in place (saves outputs + writes sidecar)
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          jupyter nbconvert --execute --inplace notebooks/ab_test_analysis.ipynb

      - name: Commit and push notebook changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notebooks/ab_test_analysis.ipynb notebooks/ab_test_analysis.summary.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[bot] update notebook analysis $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
